<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PodcastCut Voice Clone</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0a0a0a; color: #e0e0e0;
    min-height: 100vh; display: flex; justify-content: center;
    padding: 40px 20px;
  }
  .container { max-width: 640px; width: 100%; }
  h1 { font-size: 28px; margin-bottom: 8px; color: #fff; }
  .subtitle { color: #888; margin-bottom: 32px; font-size: 14px; }

  .form-group { margin-bottom: 20px; }
  label { display: block; font-size: 13px; color: #aaa; margin-bottom: 6px; font-weight: 500; }

  .upload-area {
    border: 2px dashed #333; border-radius: 12px;
    padding: 40px; text-align: center; cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
  }
  .upload-area:hover, .upload-area.dragover {
    border-color: #666; background: #1a1a1a;
  }
  .upload-area.has-file { border-color: #4a9; border-style: solid; }
  .upload-area .icon { font-size: 32px; margin-bottom: 8px; }
  .upload-area .hint { color: #666; font-size: 13px; }
  .upload-area .filename { color: #4a9; font-size: 14px; margin-top: 4px; }
  .upload-area input { display: none; }

  input[type="text"], input[type="number"], input[type="email"], input[type="password"], textarea {
    width: 100%; padding: 10px 12px; border: 1px solid #333;
    border-radius: 8px; background: #151515; color: #e0e0e0;
    font-size: 14px; outline: none;
  }
  input:focus, textarea:focus { border-color: #4a9; }
  textarea { resize: vertical; min-height: 60px; }

  .speakers-row { display: flex; gap: 10px; }
  .speakers-row > div { flex: 1; }

  button.submit {
    width: 100%; padding: 14px; border: none; border-radius: 10px;
    background: #4a9; color: #fff; font-size: 16px; font-weight: 600;
    cursor: pointer; transition: background 0.2s;
  }
  button.submit:hover { background: #3b8; }
  button.submit:disabled { background: #333; color: #666; cursor: not-allowed; }

  /* Progress */
  .progress-panel {
    display: none; margin-top: 24px;
    border: 1px solid #222; border-radius: 12px;
    padding: 20px; background: #111;
  }
  .progress-panel.active { display: block; }
  .stage-list { list-style: none; }
  .stage-list li {
    padding: 8px 0; font-size: 13px; color: #555;
    display: flex; align-items: center; gap: 8px;
  }
  .stage-list li.done { color: #4a9; }
  .stage-list li.active { color: #fff; }
  .stage-list li.error { color: #e55; }
  .stage-list li::before { content: '○'; font-size: 10px; }
  .stage-list li.done::before { content: '●'; color: #4a9; }
  .stage-list li.active::before { content: '◉'; color: #4a9; animation: pulse 1s infinite; }
  .stage-list li.error::before { content: '✕'; color: #e55; }
  @keyframes pulse { 50% { opacity: 0.4; } }
  .detail-text { font-size: 12px; color: #666; margin-top: 4px; word-break: break-all; }

  /* Result */
  .result-panel {
    display: none; margin-top: 24px;
    border: 1px solid #222; border-radius: 12px;
    padding: 20px; background: #111; text-align: center;
  }
  .result-panel.active { display: block; }
  .result-panel audio { width: 100%; margin: 16px 0; }
  .result-panel a {
    display: inline-block; padding: 10px 24px; border-radius: 8px;
    background: #4a9; color: #fff; text-decoration: none; font-weight: 500;
  }
  .result-panel a:hover { background: #3b8; }

  /* Login */
  .login-panel {
    max-width: 380px; margin: 0 auto; text-align: center;
  }
  .login-panel h2 { font-size: 22px; margin-bottom: 8px; color: #fff; }
  .login-panel .login-subtitle { color: #888; font-size: 13px; margin-bottom: 24px; }
  .login-row { display: flex; gap: 8px; margin-bottom: 12px; }
  .login-row input { flex: 1; }
  .login-row button, .login-panel .login-btn {
    padding: 10px 18px; border: none; border-radius: 8px;
    background: #4a9; color: #fff; font-size: 14px; font-weight: 500;
    cursor: pointer; white-space: nowrap;
  }
  .login-row button:hover, .login-panel .login-btn:hover { background: #3b8; }
  .login-row button:disabled, .login-panel .login-btn:disabled { background: #333; color: #666; cursor: not-allowed; }
  .login-panel .login-btn { width: 100%; padding: 12px; font-size: 15px; }
  .login-msg { font-size: 13px; margin-top: 8px; }
  .login-msg.error { color: #e55; }
  .login-msg.ok { color: #4a9; }
  .user-bar { display: flex; justify-content: flex-end; align-items: center; gap: 12px; margin-bottom: 16px; font-size: 13px; color: #888; }
  .user-bar button { background: none; border: 1px solid #444; color: #aaa; padding: 4px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; }
  .user-bar button:hover { border-color: #888; color: #fff; }
  .hidden { display: none !important; }
</style>
</head>
<body>
<div class="container">
  <!-- Login Panel -->
  <div class="login-panel" id="loginPanel">
    <h2>PodcastCut Voice Clone</h2>
    <p class="login-subtitle" id="loginSubtitle">登录</p>
    <div class="login-row">
      <input type="email" id="loginEmail" placeholder="邮箱地址">
    </div>
    <div class="login-row">
      <input type="password" id="loginPassword" placeholder="密码（至少 6 位）">
    </div>
    <button class="login-btn" id="authBtn" onclick="doAuth()">登录</button>
    <div class="login-msg" id="loginMsg"></div>
    <p style="margin-top:12px;font-size:13px;color:#888;">
      <span id="toggleText">没有账号？</span>
      <a href="#" id="toggleLink" onclick="toggleMode(event)" style="color:#4a9;">注册</a>
    </p>
  </div>

  <!-- Main App (hidden until logged in) -->
  <div id="mainApp" class="hidden">
  <div class="user-bar" id="userBar">
    <span id="userEmail"></span>
    <button onclick="logout()">退出登录</button>
  </div>
  <h1>PodcastCut Voice Clone</h1>
  <p class="subtitle">上传音频 → AI 修正文字 → 声音克隆 → 输出干净音频</p>

  <form id="jobForm">
    <div class="form-group">
      <label>音频文件</label>
      <div class="upload-area" id="uploadArea">
        <div class="icon">🎙️</div>
        <div>点击或拖拽上传音频</div>
        <div class="hint">支持 MP3, WAV, M4A, FLAC</div>
        <div class="filename" id="fileName"></div>
        <input type="file" id="audioFile" accept="audio/*">
      </div>
    </div>

    <div class="form-group">
      <label>说话人数量</label>
      <input type="number" id="speakerCount" value="2" min="1" max="10">
    </div>

    <div class="form-group" id="speakerNamesGroup">
      <label>说话人名字</label>
      <div class="speakers-row" id="speakerNames">
        <div><input type="text" placeholder="说话人 1 名字" value="说话人A" data-spk="0"></div>
        <div><input type="text" placeholder="说话人 2 名字" value="说话人B" data-spk="1"></div>
      </div>
    </div>

    <div class="form-group">
      <label>提示词（可选）</label>
      <textarea id="prompt" placeholder="例如：这是一段技术面试，请保留专业术语..."></textarea>
    </div>

    <button type="submit" class="submit" id="submitBtn">开始处理</button>
  </form>

  <div class="progress-panel" id="progressPanel">
    <ul class="stage-list" id="stageList">
      <li data-stage="transcribing">转录音频 (Gemini 3 Flash)</li>
      <li data-stage="correcting">AI 修正逐字稿 (Gemini)</li>
      <li data-stage="extracting_samples">提取说话人音频样本</li>
      <li data-stage="creating_models">创建声音模型 (Fish Audio)</li>
      <li data-stage="generating_tts">TTS 生成音频</li>
      <li data-stage="merging">合并输出音频</li>
    </ul>
    <div class="detail-text" id="detailText"></div>
  </div>

  <div class="result-panel" id="resultPanel">
    <h3>✅ 处理完成</h3>
    <audio id="audioPlayer" controls></audio>
    <br>
    <a id="downloadLink" href="#">下载音频</a>
  </div>
  </div> <!-- /mainApp -->
</div>

<script>
// --- Auth ---
const loginPanel = document.getElementById('loginPanel');
const mainApp = document.getElementById('mainApp');
const loginEmail = document.getElementById('loginEmail');
const loginPassword = document.getElementById('loginPassword');
const loginMsg = document.getElementById('loginMsg');
const authBtn = document.getElementById('authBtn');
const userEmail = document.getElementById('userEmail');
const loginSubtitle = document.getElementById('loginSubtitle');
const toggleText = document.getElementById('toggleText');
const toggleLink = document.getElementById('toggleLink');

let isRegisterMode = false;

function toggleMode(e) {
  e.preventDefault();
  isRegisterMode = !isRegisterMode;
  loginSubtitle.textContent = isRegisterMode ? '注册' : '登录';
  authBtn.textContent = isRegisterMode ? '注册' : '登录';
  toggleText.textContent = isRegisterMode ? '已有账号？' : '没有账号？';
  toggleLink.textContent = isRegisterMode ? '登录' : '注册';
  loginMsg.textContent = '';
}

async function checkAuth() {
  try {
    const resp = await fetch('/api/auth/me');
    const data = await resp.json();
    if (data.logged_in) {
      showMainApp(data.email);
    }
  } catch (e) {}
}

function showMainApp(email) {
  loginPanel.classList.add('hidden');
  mainApp.classList.remove('hidden');
  userEmail.textContent = email;
}

function showMsg(text, isError) {
  loginMsg.textContent = text;
  loginMsg.className = 'login-msg ' + (isError ? 'error' : 'ok');
}

async function doAuth() {
  const email = loginEmail.value.trim();
  const password = loginPassword.value;
  if (!email || !email.includes('@')) { showMsg('请输入有效邮箱', true); return; }
  if (password.length < 6) { showMsg('密码至少 6 位', true); return; }

  authBtn.disabled = true;
  const url = isRegisterMode ? '/api/auth/register' : '/api/auth/login';
  try {
    const resp = await fetch(url, {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({email, password}),
    });
    const data = await resp.json();
    if (resp.ok) {
      showMainApp(data.email);
    } else {
      showMsg(data.error || '操作失败', true);
    }
  } catch (e) {
    showMsg('网络错误', true);
  }
  authBtn.disabled = false;
}

function logout() {
  document.cookie = 'session_id=; max-age=0; path=/';
  mainApp.classList.add('hidden');
  loginPanel.classList.remove('hidden');
  loginMsg.textContent = '';
  loginPassword.value = '';
}

checkAuth();

// --- Main App ---
const uploadArea = document.getElementById('uploadArea');
const audioFile = document.getElementById('audioFile');
const fileName = document.getElementById('fileName');
const speakerCount = document.getElementById('speakerCount');
const speakerNames = document.getElementById('speakerNames');
const form = document.getElementById('jobForm');
const submitBtn = document.getElementById('submitBtn');
const progressPanel = document.getElementById('progressPanel');
const stageList = document.getElementById('stageList');
const detailText = document.getElementById('detailText');
const resultPanel = document.getElementById('resultPanel');

// Upload area interactions
uploadArea.addEventListener('click', () => audioFile.click());
uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('dragover'); });
uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
uploadArea.addEventListener('drop', e => {
  e.preventDefault();
  uploadArea.classList.remove('dragover');
  if (e.dataTransfer.files.length) {
    audioFile.files = e.dataTransfer.files;
    onFileSelected();
  }
});
audioFile.addEventListener('change', onFileSelected);

function onFileSelected() {
  if (audioFile.files.length) {
    fileName.textContent = audioFile.files[0].name;
    uploadArea.classList.add('has-file');
  }
}

// Dynamic speaker name inputs
speakerCount.addEventListener('change', () => {
  const n = parseInt(speakerCount.value) || 2;
  speakerNames.innerHTML = '';
  for (let i = 0; i < n; i++) {
    const div = document.createElement('div');
    div.innerHTML = `<input type="text" placeholder="说话人 ${i+1} 名字" value="说话人${String.fromCharCode(65+i)}" data-spk="${i}">`;
    speakerNames.appendChild(div);
  }
});

// Submit
form.addEventListener('submit', async e => {
  e.preventDefault();
  if (!audioFile.files.length) { alert('请先上传音频文件'); return; }

  // Build speaker names map
  const names = {};
  speakerNames.querySelectorAll('input').forEach(inp => {
    names[inp.dataset.spk] = inp.value || `说话人${inp.dataset.spk}`;
  });

  const fd = new FormData();
  fd.append('audio', audioFile.files[0]);
  fd.append('speaker_names', JSON.stringify(names));
  fd.append('speaker_count', speakerCount.value);
  fd.append('prompt', document.getElementById('prompt').value);

  submitBtn.disabled = true;
  submitBtn.textContent = '提交中...';
  progressPanel.classList.add('active');
  resultPanel.classList.remove('active');
  resetStages();

  try {
    const resp = await fetch('/api/jobs', { method: 'POST', body: fd });
    const { job_id } = await resp.json();
    listenToJob(job_id);
  } catch (err) {
    alert('提交失败: ' + err.message);
    submitBtn.disabled = false;
    submitBtn.textContent = '开始处理';
  }
});

function resetStages() {
  stageList.querySelectorAll('li').forEach(li => {
    li.className = '';
  });
  detailText.textContent = '';
}

const STAGE_ORDER = ['transcribing','correcting','extracting_samples','creating_models','generating_tts','merging','done'];

function updateStages(currentStage) {
  const idx = STAGE_ORDER.indexOf(currentStage);
  stageList.querySelectorAll('li').forEach(li => {
    const si = STAGE_ORDER.indexOf(li.dataset.stage);
    if (si < idx) li.className = 'done';
    else if (si === idx) li.className = 'active';
    else li.className = '';
  });
}

function listenToJob(jobId) {
  const es = new EventSource(`/api/jobs/${jobId}/events`);
  es.addEventListener('progress', e => {
    const data = JSON.parse(e.data);
    updateStages(data.stage);
    detailText.textContent = data.detail;
  });
  es.addEventListener('done', e => {
    es.close();
    const data = JSON.parse(e.data);
    if (data.status === 'completed') {
      // Mark all done
      stageList.querySelectorAll('li').forEach(li => li.className = 'done');
      detailText.textContent = '';
      // Show result
      resultPanel.classList.add('active');
      const url = `/api/jobs/${jobId}/download`;
      document.getElementById('audioPlayer').src = url;
      document.getElementById('downloadLink').href = url;
    } else {
      stageList.querySelectorAll('li.active').forEach(li => li.className = 'error');
      detailText.textContent = '❌ ' + (data.error || 'Unknown error');
    }
    submitBtn.disabled = false;
    submitBtn.textContent = '开始处理';
  });
  es.onerror = () => {
    es.close();
    submitBtn.disabled = false;
    submitBtn.textContent = '开始处理';
  };
}
</script>
</body>
</html>
